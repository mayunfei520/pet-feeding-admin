version: "3.9"

services:
  nginx:
    image: nginx:1.25.5
    container_name: pet-feeding-nginx
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./host-nginx/mayunfei.asia.conf:/etc/nginx/conf.d/default.conf:ro
      - ./host-nginx/mayunfei.asia.pem:/etc/nginx/certs/mayunfei.asia.pem:ro
      - ./host-nginx/mayunfei.asia.key:/etc/nginx/certs/mayunfei.asia.key:ro

  mysql:
    image: mysql:8.0
    container_name: pet-feeding-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: PetFeed_DB_R00t_2026!
      MYSQL_DATABASE: pet_feeding
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-feeding-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: pet_feeding
      MYSQL_USERNAME: petfeeder
      MYSQL_PASSWORD: PetFeeding2024!
      SM4_KEY: 9eb9423dc25e7484b46188226a3ba101
    volumes:
      - backend_data:/app/data
    expose:
      - "8080"
    ports:
      - "127.0.0.1:18080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pet-feeding-frontend
    restart: unless-stopped
    depends_on:
      - mysql
      - backend
    expose:
      - "80"

volumes:
  backend_data:
  mysql_data:
