server {
    listen 80;
    server_name 101.42.24.114;

    charset utf-8;
    charset_types text/css text/javascript application/javascript application/json application/xml text/xml;

    location /api/ {
        charset utf-8;
        proxy_http_version 1.1;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        charset utf-8;
        proxy_http_version 1.1;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mayunfei.asia www.mayunfei.asia;
    return 301 https://mayunfei.asia$request_uri;
}

server {
    listen 443 ssl;
    server_name mayunfei.asia www.mayunfei.asia;

    charset utf-8;
    charset_types text/css text/javascript application/javascript application/json application/xml text/xml;

    ssl_certificate /etc/nginx/certs/mayunfei.asia.pem;
    ssl_certificate_key /etc/nginx/certs/mayunfei.asia.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    location / {
        charset utf-8;
        proxy_http_version 1.1;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        charset utf-8;
        proxy_http_version 1.1;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
